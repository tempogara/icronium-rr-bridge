<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard RR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-bottom: 250px;
    }

    .messages-panel {
      height: 220px;
      border-top: 1px solid #dee2e6;
    }

    .messages-log {
      height: 130px;
      overflow-y: auto;
      background: #f8f9fa;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
    }

    .table tbody tr {
      cursor: pointer;
    }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
      <span class="navbar-brand mb-0">
        <img src="/images/icronium.png" alt="Icronium" style="max-height: 42px;">
      </span>
      <div class="d-flex align-items-center gap-2">
        <span id="userBadge" class="badge text-bg-secondary"></span>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger" type="button">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="card shadow-sm border-0">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h1 class="h4 mb-0">Elenco gare</h1>
          <button id="refreshBtn" class="btn btn-sm btn-outline-primary" type="button">Aggiorna</button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">EventName</th>
                <th scope="col">EventDate</th>
                <th scope="col" class="text-end">Azione</th>
              </tr>
            </thead>
            <tbody id="gareBody"></tbody>
          </table>
        </div>

        <div id="selectionInfo" class="alert alert-info mb-0 d-none" role="alert"></div>
      </div>
    </div>
  </main>

  <section class="messages-panel fixed-bottom bg-white shadow-lg">
    <div class="container py-2">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <strong>Messaggi WebSocket</strong>
        <span id="wsStatus" class="badge text-bg-warning">Connessione...</span>
      </div>
      <div id="messagesLog" class="messages-log border rounded p-2"></div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <script>
    const STORAGE_KEYS = {
      auth: 'rr.auth',
      garaDettaglio: 'rr.garaDettaglio',
      selectedGara: 'rr.selectedGara'
    };

    const gareBody = document.getElementById('gareBody');
    const selectionInfo = document.getElementById('selectionInfo');
    const userBadge = document.getElementById('userBadge');
    const logoutBtn = document.getElementById('logoutBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const messagesLog = document.getElementById('messagesLog');
    const wsStatus = document.getElementById('wsStatus');

    let selectedGaraId = null;
    let stompClient = null;
    let keepAliveTimerId = null;

    function readAuthSession() {
      const raw = localStorage.getItem(STORAGE_KEYS.auth);
      if (!raw) {
        return null;
      }

      try {
        return JSON.parse(raw);
      } catch (_error) {
        return null;
      }
    }

    function requireLogin() {
      const auth = readAuthSession();
      if (!auth || !auth.userId) {
        window.location.href = '/index.html';
        return null;
      }

      userBadge.textContent = `${auth.userId} (${auth.mode})`;
      return auth;
    }

    function appendWsMessage(text) {
      const line = document.createElement('div');
      line.textContent = `${new Date().toLocaleTimeString()} - ${text}`;
      messagesLog.appendChild(line);
      messagesLog.scrollTop = messagesLog.scrollHeight;
    }

    function setWsStatus(label, style) {
      wsStatus.className = `badge ${style}`;
      wsStatus.textContent = label;
    }

    function redirectToLogin() {
      localStorage.removeItem(STORAGE_KEYS.auth);
      window.location.href = '/index.html';
    }

    async function keepSessionAlive(silent) {
      const response = await fetch('/api/auth/keepalive');
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        throw new Error('Keepalive failed');
      }
      if (!silent) {
        appendWsMessage('Session keepalive OK');
      }
      return response.json();
    }

    function startKeepAlive() {
      if (keepAliveTimerId) {
        window.clearInterval(keepAliveTimerId);
      }
      keepAliveTimerId = window.setInterval(async () => {
        try {
          await keepSessionAlive(true);
        } catch (error) {
          appendWsMessage(error.message);
        }
      }, 5 * 60 * 1000);
    }

    async function loadGare() {
      const response = await fetch('/api/gare');
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }

      if (!response.ok) {
        throw new Error('Impossibile recuperare l\'elenco gare');
      }

      return response.json();
    }

    function renderGare(gare) {
      gareBody.innerHTML = '';

      gare.forEach((gara) => {
        const row = document.createElement('tr');
        row.dataset.garaId = gara.id;
        row.innerHTML = `
          <td>${gara.id}</td>
          <td>${gara.eventName}</td>
          <td>${gara.eventDate}</td>
          <td class="text-end"><button class="btn btn-sm btn-primary" type="button">Seleziona</button></td>
        `;

        row.addEventListener('click', () => selectGara(gara, row));
        row.querySelector('button').addEventListener('click', (event) => {
          event.stopPropagation();
          openGaraDettaglio(gara, row);
        });

        gareBody.appendChild(row);
      });
    }

    function selectGara(gara, clickedRow) {
      selectedGaraId = gara.id;

      document.querySelectorAll('#gareBody tr').forEach((row) => {
        row.classList.remove('table-primary');
      });

      clickedRow.classList.add('table-primary');
      selectionInfo.classList.remove('d-none');
      selectionInfo.textContent = `Gara selezionata: ${gara.id} - ${gara.eventName}`;

      appendWsMessage(`Selezionata gara ${gara.id} - ${gara.eventName}`);
    }

    async function openGaraDettaglio(gara, row) {
      selectGara(gara, row);
      try {
        const response = await fetch(`/api/gare/${encodeURIComponent(gara.id)}/dettaglio`);
        if (response.status === 401) {
          localStorage.removeItem(STORAGE_KEYS.auth);
          window.location.href = '/index.html';
          return;
        }
        if (!response.ok) {
          throw new Error('Errore caricamento dettaglio gara');
        }

        const dettaglio = await response.json();
        sessionStorage.setItem(STORAGE_KEYS.selectedGara, JSON.stringify({
          id: gara.id,
          eventName: gara.eventName,
          eventDate: gara.eventDate
        }));
        sessionStorage.setItem(STORAGE_KEYS.garaDettaglio, JSON.stringify(dettaglio));
        window.location.href = `/gara-dettaglio.html?eventId=${encodeURIComponent(gara.id)}`;
      } catch (error) {
        appendWsMessage(error.message);
      }
    }

    function connectWebSocket() {
      const socket = new SockJS('/ws');

      stompClient = new StompJs.Client({
        webSocketFactory: () => socket,
        reconnectDelay: 5000,
        onConnect: () => {
          setWsStatus('Connesso', 'text-bg-success');
          appendWsMessage('Connessione WebSocket attiva');

          stompClient.subscribe('/topic/messages', (message) => {
            try {
              const payload = JSON.parse(message.body);
              appendWsMessage(`${payload.sender}: ${payload.content}`);
            } catch (_error) {
              appendWsMessage(`Messaggio non valido: ${message.body}`);
            }
          });
        },
        onStompError: (frame) => {
          setWsStatus('Errore', 'text-bg-danger');
          appendWsMessage(`Errore STOMP: ${frame.headers['message'] || 'sconosciuto'}`);
        },
        onWebSocketClose: () => {
          setWsStatus('Disconnesso', 'text-bg-secondary');
          appendWsMessage('WebSocket disconnesso');
        }
      });

      stompClient.activate();
    }

    logoutBtn.addEventListener('click', async () => {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
      } catch (_error) {
      } finally {
        redirectToLogin();
      }
    });

    refreshBtn.addEventListener('click', async () => {
      try {
        const gare = await loadGare();
        renderGare(gare);
      } catch (error) {
        appendWsMessage(error.message);
      }
    });

    (async function init() {
      const auth = requireLogin();
      if (!auth) {
        return;
      }

      try {
        await keepSessionAlive(true);
        const gare = await loadGare();
        renderGare(gare);
      } catch (error) {
        appendWsMessage(error.message);
      }

      connectWebSocket();
      startKeepAlive();
    })();
  </script>
</body>
</html>
