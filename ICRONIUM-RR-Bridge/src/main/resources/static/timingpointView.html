<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timing Point View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      padding-bottom: 240px;
      background: #f6f7f9;
    }
    body.messages-collapsed {
      padding-bottom: 56px;
    }
    .toolbar-box {
      background: #ececee;
      border: 1px solid #d2d2d2;
      border-radius: 8px;
      padding: 10px;
    }
    .toolbar-row {
      border-bottom: 1px solid #d4d4d4;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .rrid-label {
      display: inline-block;
      background: #0d6efd;
      color: #ffffff;
      border-radius: 6px;
      padding: 6px 10px;
      font-weight: 600;
      min-width: 180px;
    }
    .btn-bordeaux {
      background-color: #d20610;
      border-color: #b7050e;
      color: #ffffff;
    }
    .btn-bordeaux:hover {
      background-color: #b7050e;
      border-color: #99040c;
      color: #ffffff;
    }
    .messages-panel {
      height: 220px;
      border-top: 1px solid #dee2e6;
      transition: transform 0.2s ease;
    }
    .messages-panel.is-collapsed {
      transform: translateY(calc(100% - 46px));
    }
    .messages-log {
      height: 130px;
      overflow-y: auto;
      background: #f8f9fa;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 0.85rem;
    }
    .messages-toggle {
      min-width: 38px;
      font-weight: 700;
      line-height: 1;
    }
    .totals-box {
      display: grid;
      grid-template-columns: repeat(4, minmax(58px, auto));
      gap: 6px;
      min-width: 272px;
    }
    .totals-head {
      font-size: 0.74rem;
      font-weight: 700;
      color: #6c757d;
      text-align: center;
      line-height: 1;
      text-transform: uppercase;
    }
    .totals-value {
      border: 1px solid #d6dae0;
      border-radius: 4px;
      background: #f8f9fb;
      padding: 8px 10px;
      text-align: center;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #212529;
      min-width: 0;
      line-height: 1.2;
    }
    .totals-value-btn {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      line-height: inherit;
    }
    .totals-value-btn:hover {
      text-decoration: underline;
    }
    .totals-button {
      width: 100%;
      padding: 8px 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      line-height: 1.2;
    }
    .totals-green {
      background: #1f9d55;
      border-color: #18804a;
      color: #ffffff;
    }
    .totals-yellow {
      background: #f2c94c;
      border-color: #dfb52f;
      color: #1f2327;
    }
    .totals-red {
      background: #d64545;
      border-color: #b33434;
      color: #ffffff;
    }
    .totals-blue {
      background: #0d6efd;
      border-color: #0b5ed7;
      color: #ffffff;
    }
    .source-stack {
      display: grid;
      gap: 4px;
      min-width: 260px;
    }
    .source-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px dashed #e1e4e8;
      padding-bottom: 4px;
    }
    .source-line:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }
    .source-name {
      font-size: 0.92rem;
      color: #212529;
      word-break: break-word;
    }
    .source-name-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .source-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 0.68rem;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .source-local { background: #198754; }
    .source-lan { background: #fd7e14; }
    .source-web { background: #0d6efd; }
    .row-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 82px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }
    .row-status-running {
      background: #1f9d55;
      color: #ffffff;
    }
    .row-status-stopped {
      background: #d64545;
      color: #ffffff;
    }
    .row-status-error {
      background: #f2c94c;
      color: #1f2327;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
    <div class="container-fluid">
      <span class="navbar-brand mb-0">
        <img src="/images/icronium.png" alt="Icronium" style="max-height: 42px;">
      </span>
      <div class="d-flex align-items-center gap-2">
        <button id="btnOpenRr" class="btn btn-sm btn-bordeaux d-inline-flex align-items-center gap-2" type="button">
          <img src="/images/open-rr.png" alt="" style="width:18px;height:18px;border-radius:3px;">
          <span>Open RR</span>
        </button>
        <button id="btnRrLive" class="btn btn-sm btn-outline-secondary" type="button">RR Live</button>
        <button id="btnDetailView" class="btn btn-sm btn-outline-secondary" type="button">Race Detail</button>
        <button id="backToMenuBtn" class="btn btn-sm btn-outline-primary" type="button">Dashboard</button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <div class="row g-3 mb-3">
      <div class="col-12 col-md-8">
        <div id="eventNameText" class="fw-bold fs-5"></div>
      </div>
      <div class="col-12 col-md-4">
        <div id="eventDateText" class="fw-bold fs-5"></div>
      </div>
    </div>

    <div class="toolbar-box mb-3">
      <div class="d-flex flex-wrap align-items-center gap-2 toolbar-row">
        <span class="mb-0 fw-semibold">RR ID:</span>
        <span id="rrIdLabel" class="rrid-label"></span>
        <button id="syncBtn" class="btn btn-outline-secondary">SYNC</button>
        <button id="refreshBtn" class="btn btn-outline-secondary">Refresh</button>
        <span id="groupCountBadge" class="badge text-bg-secondary ms-auto">Timing points: 0</span>
      </div>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-bordered table-hover mb-0 align-middle">
            <thead class="table-light">
              <tr>
                <th>Timing point</th>
                <th>Sources</th>
                <th>Totals</th>
              </tr>
            </thead>
            <tbody id="tpViewBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <section id="messagesPanel" class="messages-panel fixed-bottom bg-white shadow-lg">
    <div class="container-fluid py-2">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div class="d-flex align-items-center gap-2">
          <strong>Messages</strong>
          <span id="wsStatus" class="badge text-bg-warning">Connecting...</span>
        </div>
        <button id="messagesToggleBtn" type="button" class="btn btn-sm btn-outline-secondary messages-toggle" aria-label="Collapse messages">▼</button>
      </div>
      <div id="messagesLog" class="messages-log border rounded p-2"></div>
    </div>
  </section>

  <div class="modal fade" id="tpReadModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 id="tpReadTitle" class="modal-title">Timing point readings</h5>
            <div id="tpReadSubtitle" class="small text-muted mt-1"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <div class="table-responsive" style="max-height: 65vh;">
            <table class="table table-striped table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width: 80px;">#</th>
                  <th style="width: 180px;">Timestamp</th>
                  <th>Passing</th>
                  <th style="width: 220px;">Source file</th>
                  <th style="width: 30%;">Athlete</th>
                </tr>
              </thead>
              <tbody id="tpReadBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="tpUniqueModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <div>
            <h5 id="tpUniqueTitle" class="modal-title">Unique chips</h5>
            <div id="tpUniqueSubtitle" class="small text-muted mt-1"></div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0">
          <div class="table-responsive" style="max-height: 65vh;">
            <table class="table table-striped table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th style="width: 80px;">#</th>
                  <th style="width: 180px;">
                    <div class="d-flex align-items-center justify-content-between gap-2">
                      <span>Timestamp</span>
                      <button id="tpUniqueOrderBtn" type="button" class="btn btn-sm btn-outline-secondary">Newest</button>
                    </div>
                  </th>
                  <th style="width: 180px;">Chip</th>
                  <th style="width: 220px;">Source file</th>
                  <th style="width: 30%;">Athlete</th>
                </tr>
                <tr>
                  <th colspan="5">
                    <input id="tpUniqueFilterInput" type="text" class="form-control form-control-sm" placeholder="Filter chip, source or athlete">
                  </th>
                </tr>
              </thead>
              <tbody id="tpUniqueBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEYS = {
      auth: 'rr.auth',
      selectedGara: 'rr.selectedGara'
    };

    const rrIdLabel = document.getElementById('rrIdLabel');
    const eventNameText = document.getElementById('eventNameText');
    const eventDateText = document.getElementById('eventDateText');
    const btnOpenRr = document.getElementById('btnOpenRr');
    const btnRrLive = document.getElementById('btnRrLive');
    const btnDetailView = document.getElementById('btnDetailView');
    const backToMenuBtn = document.getElementById('backToMenuBtn');
    const syncBtn = document.getElementById('syncBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const groupCountBadge = document.getElementById('groupCountBadge');
    const tpViewBody = document.getElementById('tpViewBody');
    const messagesPanel = document.getElementById('messagesPanel');
    const messagesLog = document.getElementById('messagesLog');
    const messagesToggleBtn = document.getElementById('messagesToggleBtn');
    const wsStatus = document.getElementById('wsStatus');
    const tpReadTitle = document.getElementById('tpReadTitle');
    const tpReadSubtitle = document.getElementById('tpReadSubtitle');
    const tpReadBody = document.getElementById('tpReadBody');
    const tpReadModal = new bootstrap.Modal(document.getElementById('tpReadModal'));
    const tpUniqueTitle = document.getElementById('tpUniqueTitle');
    const tpUniqueSubtitle = document.getElementById('tpUniqueSubtitle');
    const tpUniqueBody = document.getElementById('tpUniqueBody');
    const tpUniqueOrderBtn = document.getElementById('tpUniqueOrderBtn');
    const tpUniqueFilterInput = document.getElementById('tpUniqueFilterInput');
    const tpUniqueModal = new bootstrap.Modal(document.getElementById('tpUniqueModal'));

    let currentRows = [];
    let keepAliveTimerId = null;
    let tpUniqueRows = [];
    let tpUniqueNewestFirst = true;
    let tpUniqueFilter = '';

    function getEventId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('eventId');
    }

    function requireLogin() {
      const auth = localStorage.getItem(STORAGE_KEYS.auth);
      if (!auth) {
        window.location.href = '/index.html';
        return false;
      }
      return true;
    }

    function redirectToLogin() {
      localStorage.removeItem(STORAGE_KEYS.auth);
      window.location.href = '/index.html';
    }

    async function keepSessionAlive(silent) {
      const response = await fetch('/api/auth/keepalive');
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        throw new Error('Keepalive failed');
      }
      if (!silent) {
        appendWsMessage('Session keepalive OK');
      }
      return response.json();
    }

    function startKeepAlive() {
      if (keepAliveTimerId) {
        window.clearInterval(keepAliveTimerId);
      }
      keepAliveTimerId = window.setInterval(async () => {
        try {
          await keepSessionAlive(true);
        } catch (error) {
          appendWsMessage(error.message);
        }
      }, 5 * 60 * 1000);
    }

    function loadEventMeta() {
      const eventId = getEventId();
      rrIdLabel.textContent = eventId || '';
      const raw = sessionStorage.getItem(STORAGE_KEYS.selectedGara);
      if (!raw) {
        eventNameText.textContent = '';
        eventDateText.textContent = '';
        return;
      }
      try {
        const data = JSON.parse(raw);
        if (data && data.id === eventId) {
          eventNameText.textContent = data.eventName || '';
          eventDateText.textContent = data.eventDate || '';
          return;
        }
      } catch (_error) {
      }
      eventNameText.textContent = '';
      eventDateText.textContent = '';
    }

    function appendWsMessage(text) {
      const line = document.createElement('div');
      line.textContent = `${new Date().toLocaleTimeString()} - ${text}`;
      messagesLog.appendChild(line);
      messagesLog.scrollTop = messagesLog.scrollHeight;
    }

    function setWsStatus(label, style) {
      wsStatus.className = `badge ${style}`;
      wsStatus.textContent = label;
    }

    function setMessagesCollapsed(collapsed) {
      const isCollapsed = !!collapsed;
      messagesPanel.classList.toggle('is-collapsed', isCollapsed);
      document.body.classList.toggle('messages-collapsed', isCollapsed);
      messagesToggleBtn.textContent = isCollapsed ? '▲' : '▼';
      messagesToggleBtn.setAttribute('aria-label', isCollapsed ? 'Expand messages' : 'Collapse messages');
      localStorage.setItem('rr.tpview.messagesCollapsed', isCollapsed ? '1' : '0');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function callSync() {
      const eventId = getEventId();
      const response = await fetch(`/api/gare/${encodeURIComponent(eventId)}/sync`, { method: 'POST' });
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        throw new Error('Error during sync');
      }
      return response.json();
    }

    async function loadRows() {
      const eventId = getEventId();
      const response = await fetch(`/api/gare/${encodeURIComponent(eventId)}/rows`);
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        throw new Error('Error loading rows');
      }
      return response.json();
    }

    async function loadBibChip() {
      const eventId = getEventId();
      const response = await fetch(`/api/gare/${encodeURIComponent(eventId)}/bib-chip`);
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (response.status === 409) {
        throw new Error('No session data available. Run SYNC first.');
      }
      if (!response.ok) {
        throw new Error('Error loading BIB-CHIP');
      }
      return response.json();
    }

    async function loadRowFileContent(rowId) {
      const eventId = getEventId();
      const response = await fetch(`/api/gare/${encodeURIComponent(eventId)}/rows/${encodeURIComponent(rowId)}/content`);
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || 'Error loading file content');
      }
      return response.text();
    }

    async function loadRrOpenUrl() {
      const eventId = getEventId();
      const response = await fetch(`/api/auth/rr-open-url/${encodeURIComponent(eventId)}`);
      if (response.status === 401) {
        redirectToLogin();
        throw new Error('Session expired');
      }
      if (!response.ok) {
        throw new Error('Error building RR URL');
      }
      return response.json();
    }

    function extractFileName(source) {
      const value = (source || '').trim();
      if (!value) {
        return '';
      }
      const noQuery = value.split('?')[0];
      const normalized = noQuery.replace(/\\/g, '/');
      const chunks = normalized.split('/');
      return chunks[chunks.length - 1] || value;
    }

    function detectSourceType(source) {
      const value = (source || '').trim().toLowerCase();
      if (value.includes('192.168.')) {
        return 'lan';
      }
      if (value.startsWith('http://') || value.startsWith('https://')) {
        return 'web';
      }
      return 'local';
    }

    function extractChipFromPassingLine(line) {
      const raw = (line || '').trim();
      if (!raw || raw.includes('*')) {
        return null;
      }
      const separator = raw.includes('\t') ? '\t' : ';';
      const chip = raw.split(separator)[0].replaceAll('"', '').trim();
      return chip || null;
    }

    function extractTimestampFromPassingLine(line) {
      const raw = (line || '').trim();
      if (!raw) {
        return '';
      }
      const separator = raw.includes('\t') ? '\t' : ';';
      const parts = raw.split(separator);
      if (parts.length < 2) {
        return '';
      }
      return parts[1].replaceAll('"', '').trim();
    }

    function buildBibChipNameMap(data) {
      const map = new Map();
      (data && Array.isArray(data.rows) ? data.rows : []).forEach((row) => {
        const chip = (row && row.chip ? String(row.chip).trim() : '');
        if (!chip) {
          return;
        }
        const lastName = row && row.lastName ? String(row.lastName).trim() : '';
        const firstName = row && row.firstName ? String(row.firstName).trim() : '';
        map.set(chip, `${lastName} ${firstName}`.trim());
      });
      return map;
    }

    function visibleDiscardedLines(row) {
      const lines = row && Array.isArray(row.discardedLines) ? row.discardedLines : [];
      const blacklisted = new Set(row && Array.isArray(row.blacklistedCodes) ? row.blacklistedCodes : []);
      return lines.filter((line) => {
        if (typeof line !== 'string' || line.includes('*')) {
          return false;
        }
        const chip = extractChipFromPassingLine(line);
        return !chip || !blacklisted.has(chip);
      });
    }

    function groupRowsByTimingPoint(rows) {
      const groups = new Map();
      (rows || []).forEach((row) => {
        const key = (row && row.timingPoint ? String(row.timingPoint).trim() : '') || '(No timing point)';
        if (!groups.has(key)) {
          groups.set(key, []);
        }
        groups.get(key).push(row);
      });
      return Array.from(groups.entries())
        .map(([timingPoint, groupRows]) => ({ timingPoint, rows: groupRows }))
        .sort((a, b) => a.timingPoint.localeCompare(b.timingPoint));
    }

    function renderSourceList(rows) {
      return `<div class="source-stack">${(rows || []).map((row) => {
        const stato = row.stato || 'Stopped';
        const statoLower = stato.toLowerCase();
        const isRunning = statoLower === 'running' || statoLower === 'error';
        const isError = !!row.errorState;
        const statusClass = isError ? 'row-status-error' : (isRunning ? 'row-status-running' : 'row-status-stopped');
        const statusText = isError ? 'ERROR' : (isRunning ? 'RUNNING' : 'STOPPED');
        const type = detectSourceType(row && row.source ? row.source : '');
        const iconClass = type === 'local' ? 'source-local' : (type === 'lan' ? 'source-lan' : 'source-web');
        const iconText = type === 'local' ? 'L' : (type === 'lan' ? 'N' : 'W');
        return `<div class="source-line"><span class="source-name-wrap"><span class="source-icon ${iconClass}">${iconText}</span><span class="source-name">${escapeHtml(extractFileName(row.source || ''))}</span></span><span class="row-status ${statusClass}">${statusText}</span></div>`;
      }).join('')}</div>`;
    }

    function renderTotals(group) {
      const read = (group.rows || []).reduce((sum, row) => sum + (Number(row && row.righeFile) || 0), 0);
      const sent = (group.rows || []).reduce((sum, row) => sum + (Number(row && row.righePo) || 0), 0);
      const discarded = (group.rows || []).reduce((sum, row) => sum + visibleDiscardedLines(row).length, 0);
      const unique = countUniqueChips(group);
      const readClass = read > 0 ? 'totals-value totals-green' : 'totals-value';
      let sentClass = 'totals-value totals-red';
      if (sent > 0 && sent < read) {
        sentClass = 'totals-value totals-yellow';
      } else if (sent > 0 && sent === read) {
        sentClass = 'totals-value totals-green';
      }
      const uniqueClass = unique > 0 ? 'totals-value totals-blue' : 'totals-value';
      const discardedClass = discarded > 0 ? 'btn btn-sm btn-danger totals-button' : 'btn btn-sm btn-outline-secondary totals-button';
      return `<div class="totals-box">
        <span class="totals-head">READ</span>
        <span class="totals-head">SENT</span>
        <span class="totals-head">DISC</span>
        <span class="totals-head">UNIQUE</span>
        <span class="${readClass}"><button type="button" class="totals-value-btn show-tp-read-btn">${read}</button></span>
        <span class="${sentClass}">${sent}</span>
        <button type="button" class="${discardedClass}" disabled>${discarded}</button>
        <span class="${uniqueClass}"><button type="button" class="totals-value-btn show-tp-unique-btn">${unique}</button></span>
      </div>`;
    }

    function countUniqueChips(group) {
      const unique = new Set();
      (group && Array.isArray(group.rows) ? group.rows : []).forEach((row) => {
        const details = Array.isArray(row && row.downloadCycleDetails) ? row.downloadCycleDetails : [];
        details.forEach((cycleLines) => {
          (Array.isArray(cycleLines) ? cycleLines : []).forEach((line) => {
            const chip = extractChipFromPassingLine(line);
            if (chip) {
              unique.add(chip);
            }
          });
        });
      });
      return unique.size;
    }

    function renderGroups(rows) {
      currentRows = Array.isArray(rows) ? [...rows] : [];
      const groups = groupRowsByTimingPoint(currentRows);
      groupCountBadge.textContent = `Timing points: ${groups.length}`;
      tpViewBody.innerHTML = '';
      if (groups.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="3" class="text-center text-muted py-4">No timing point data</td>';
        tpViewBody.appendChild(tr);
        return;
      }
      groups.forEach((group) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="fw-semibold">${escapeHtml(group.timingPoint)}</td>
          <td>${renderSourceList(group.rows)}</td>
          <td>${renderTotals(group)}</td>
        `;
        const readBtn = tr.querySelector('.show-tp-read-btn');
        if (readBtn) {
          readBtn.addEventListener('click', async () => {
            try {
              await openTimingPointReadModal(group);
            } catch (error) {
              appendWsMessage(error.message);
            }
          });
        }
        const uniqueBtn = tr.querySelector('.show-tp-unique-btn');
        if (uniqueBtn) {
          uniqueBtn.addEventListener('click', async () => {
            try {
              await openTimingPointUniqueModal(group);
            } catch (error) {
              appendWsMessage(error.message);
            }
          });
        }
        tpViewBody.appendChild(tr);
      });
    }

    async function openTimingPointReadModal(group) {
      tpReadTitle.textContent = `Timing point readings - ${group.timingPoint}`;
      tpReadSubtitle.textContent = 'Loading aggregated source content';
      tpReadBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr>';
      tpReadModal.show();
      const [bibChipData, contents] = await Promise.all([
        loadBibChip().catch(() => ({ rows: [] })),
        Promise.all((group.rows || []).map(async (row) => ({
          row,
          content: await loadRowFileContent(row.rowId).catch(() => '')
        })))
      ]);
      const nameMap = buildBibChipNameMap(bibChipData);
      const aggregated = contents.flatMap(({ row, content }) => {
        const blacklisted = new Set(Array.isArray(row && row.blacklistedCodes) ? row.blacklistedCodes : []);
        return String(content || '')
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter((line) => line && !line.includes('*'))
          .filter((line) => {
            const chip = extractChipFromPassingLine(line);
            return !chip || !blacklisted.has(chip);
          })
          .map((line) => ({
            line,
            timestamp: extractTimestampFromPassingLine(line),
            sourceFile: extractFileName(row && row.source ? row.source : ''),
            athlete: (() => {
              const chip = extractChipFromPassingLine(line);
              return chip ? (nameMap.get(chip) || '') : '';
            })()
          }));
      }).sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));

      tpReadSubtitle.textContent = `${group.rows.length} sources · ${aggregated.length} readings`;
      tpReadBody.innerHTML = '';
      if (aggregated.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="5" class="text-center text-muted py-3">No readings available</td>';
        tpReadBody.appendChild(tr);
        return;
      }
      aggregated.forEach((entry, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td class="mono">${escapeHtml(entry.timestamp)}</td>
          <td><code>${escapeHtml(entry.line)}</code></td>
          <td>${escapeHtml(entry.sourceFile)}</td>
          <td>${escapeHtml(entry.athlete)}</td>
        `;
        tpReadBody.appendChild(tr);
      });
    }

    function renderTimingPointUniqueRows() {
      tpUniqueBody.innerHTML = '';
      const orderedRows = tpUniqueNewestFirst
        ? [...tpUniqueRows]
        : [...tpUniqueRows].reverse();
      tpUniqueOrderBtn.textContent = tpUniqueNewestFirst ? 'Newest' : 'Oldest';
      const filter = tpUniqueFilter.trim().toLowerCase();
      const rows = orderedRows.filter((entry) => {
        if (!filter) {
          return true;
        }
        return (entry.chip || '').toLowerCase().includes(filter)
          || (entry.sourceFile || '').toLowerCase().includes(filter)
          || (entry.athlete || '').toLowerCase().includes(filter)
          || (entry.timestamp || '').toLowerCase().includes(filter);
      });
      if (rows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="5" class="text-center text-muted py-3">No matching unique chips</td>';
        tpUniqueBody.appendChild(tr);
        return;
      }
      rows.forEach((entry, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td class="mono">${escapeHtml(entry.timestamp)}</td>
          <td class="mono">${escapeHtml(entry.chip)}</td>
          <td>${escapeHtml(entry.sourceFile)}</td>
          <td>${escapeHtml(entry.athlete)}</td>
        `;
        tpUniqueBody.appendChild(tr);
      });
    }

    async function openTimingPointUniqueModal(group) {
      tpUniqueTitle.textContent = `Unique chips - ${group.timingPoint}`;
      tpUniqueSubtitle.textContent = 'Loading aggregated source content';
      tpUniqueBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">Loading...</td></tr>';
      tpUniqueModal.show();
      const [bibChipData, contents] = await Promise.all([
        loadBibChip().catch(() => ({ rows: [] })),
        Promise.all((group.rows || []).map(async (row) => ({
          row,
          content: await loadRowFileContent(row.rowId).catch(() => '')
        })))
      ]);
      const nameMap = buildBibChipNameMap(bibChipData);
      const latestByChip = new Map();
      contents.forEach(({ row, content }) => {
        const blacklisted = new Set(Array.isArray(row && row.blacklistedCodes) ? row.blacklistedCodes : []);
        String(content || '')
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter((line) => line && !line.includes('*'))
          .forEach((line) => {
            const chip = extractChipFromPassingLine(line);
            if (!chip || blacklisted.has(chip)) {
              return;
            }
            const entry = {
              chip,
              timestamp: extractTimestampFromPassingLine(line),
              sourceFile: extractFileName(row && row.source ? row.source : ''),
              athlete: nameMap.get(chip) || ''
            };
            const current = latestByChip.get(chip);
            if (!current || (entry.timestamp || '').localeCompare(current.timestamp || '') > 0) {
              latestByChip.set(chip, entry);
            }
          });
      });
      tpUniqueRows = Array.from(latestByChip.values())
        .sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      tpUniqueNewestFirst = true;
      tpUniqueFilter = '';
      tpUniqueFilterInput.value = '';
      tpUniqueSubtitle.textContent = `${group.rows.length} sources · ${tpUniqueRows.length} unique chips`;
      renderTimingPointUniqueRows();
    }

    function applyRowUpdate(updatedRow) {
      if (!updatedRow || !updatedRow.rowId) {
        return;
      }
      const index = currentRows.findIndex((row) => row.rowId === updatedRow.rowId);
      if (index >= 0) {
        currentRows[index] = updatedRow;
      } else {
        currentRows.push(updatedRow);
      }
      renderGroups(currentRows);
    }

    function connectWebSocket() {
      const socket = new SockJS('/ws');
      const client = new StompJs.Client({
        webSocketFactory: () => socket,
        reconnectDelay: 5000,
        onConnect: () => {
          setWsStatus('Connected', 'text-bg-success');
          appendWsMessage('WebSocket connection active');
          client.subscribe('/topic/messages', (message) => {
            try {
              const payload = JSON.parse(message.body);
              appendWsMessage(`${payload.sender}: ${payload.content}`);
            } catch (_error) {
              appendWsMessage(`Invalid message payload: ${message.body}`);
            }
          });
          client.subscribe('/topic/gare-updates', (message) => {
            try {
              const payload = JSON.parse(message.body);
              if (!payload || payload.eventId !== getEventId() || !payload.row) {
                return;
              }
              applyRowUpdate(payload.row);
            } catch (_error) {
            }
          });
        },
        onStompError: () => {
          setWsStatus('Error', 'text-bg-danger');
        },
        onWebSocketClose: () => {
          setWsStatus('Disconnected', 'text-bg-secondary');
        }
      });
      client.activate();
    }

    backToMenuBtn.addEventListener('click', () => {
      window.location.href = '/dashboard.html';
    });

    btnDetailView.addEventListener('click', () => {
      const eventId = getEventId();
      window.location.href = eventId
        ? `/gara-dettaglio.html?eventId=${encodeURIComponent(eventId)}`
        : '/gara-dettaglio.html';
    });

    btnRrLive.addEventListener('click', () => {
      const eventId = getEventId();
      window.location.href = eventId
        ? `/rr-live.html?eventId=${encodeURIComponent(eventId)}`
        : '/rr-live.html';
    });

    btnOpenRr.addEventListener('click', async () => {
      try {
        const data = await loadRrOpenUrl();
        if (!data || !data.url) {
          throw new Error('RR URL is empty');
        }
        window.open(data.url, '_blank', 'noopener,noreferrer');
      } catch (error) {
        appendWsMessage(error.message);
      }
    });

    syncBtn.addEventListener('click', async () => {
      try {
        await callSync();
        const rows = await loadRows();
        renderGroups(rows);
        appendWsMessage('SYNC completed');
      } catch (error) {
        appendWsMessage(error.message);
      }
    });

    refreshBtn.addEventListener('click', async () => {
      try {
        const rows = await loadRows();
        renderGroups(rows);
        appendWsMessage('View refreshed');
      } catch (error) {
        appendWsMessage(error.message);
      }
    });

    messagesToggleBtn.addEventListener('click', () => {
      setMessagesCollapsed(!messagesPanel.classList.contains('is-collapsed'));
    });

    tpUniqueOrderBtn.addEventListener('click', () => {
      tpUniqueNewestFirst = !tpUniqueNewestFirst;
      renderTimingPointUniqueRows();
    });

    tpUniqueFilterInput.addEventListener('input', () => {
      tpUniqueFilter = tpUniqueFilterInput.value || '';
      renderTimingPointUniqueRows();
    });

    (async function init() {
      if (!requireLogin()) {
        return;
      }
      setMessagesCollapsed(localStorage.getItem('rr.tpview.messagesCollapsed') === '1');
      startKeepAlive();
      loadEventMeta();
      try {
        await keepSessionAlive(true);
        await callSync();
        const rows = await loadRows();
        renderGroups(rows);
      } catch (error) {
        appendWsMessage(error.message);
      }
      connectWebSocket();
    })();
  </script>
</body>
</html>
